<svg width="900" height="320" viewBox="0 0 900 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="termBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- terminal window -->
  <g filter="url(#softShadow)">
    <rect x="30" y="20" width="840" height="280" rx="12" fill="url(#termBg)" stroke="#30363d" stroke-width="1.5"/>

    <!-- title bar -->
    <rect x="30" y="20" width="840" height="34" rx="12" fill="#21262d"/>
    <rect x="30" y="42" width="840" height="12" fill="#21262d"/>
    <circle cx="52" cy="37" r="6" fill="#ff5f56"/>
    <circle cx="72" cy="37" r="6" fill="#ffbd2e"/>
    <circle cx="92" cy="37" r="6" fill="#27c93f"/>
    <text x="450" y="42" text-anchor="middle" font-family="Fira Code, monospace" font-size="12" fill="#8b949e">fahad@dev-machine: ~/projects</text>
  </g>

  <!-- terminal text lines, each fades/holds/fades in a loop cycle -->
  <g font-family="Fira Code, monospace" font-size="15">

    <!-- line 1 -->
    <text x="50" y="90" fill="#27c93f">
      <tspan fill="#2E9EF7">$</tspan> python gpt.py
      <animate attributeName="opacity" values="0;0;1;1;1;1;1;1;0" keyTimes="0;0.01;0.05;0.7;0.75;0.9;0.95;0.98;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- line 2 -->
    <text x="50" y="118" fill="#c9d1d9">
      training GPT from scratch on Tiny Shakespeare...
      <animate attributeName="opacity" values="0;0;0;1;1;1;1;0" keyTimes="0;0.08;0.12;0.18;0.7;0.9;0.95;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- line 3 -->
    <text x="50" y="146" fill="#8b949e">
      step 0: train loss 4.17 | val loss 4.17
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.15;0.2;0.25;0.9;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- line 4 -->
    <text x="50" y="174" fill="#8b949e">
      step 5000: train loss 2.28 | val loss 2.43
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.22;0.28;0.34;0.9;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- line 5 -->
    <text x="50" y="202" fill="#27c93f">
      ✓ model saved &#8594; checkpoint.pt
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.36;0.4;0.44;0.9;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- line 6 -->
    <text x="50" y="238" fill="#27c93f">
      <tspan fill="#2E9EF7">$</tspan> streamlit run app.py
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.5;0.54;0.58;0.9;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- line 7 -->
    <text x="50" y="266" fill="#c9d1d9">
      Knowledge Graph Builder running on http://localhost:8501
      <animate attributeName="opacity" values="0;0;0;1;1;0" keyTimes="0;0.62;0.66;0.7;0.9;1" dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- blinking cursor -->
    <rect x="50" y="278" width="9" height="16" fill="#2E9EF7">
      <animate attributeName="opacity" values="1;1;0;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
