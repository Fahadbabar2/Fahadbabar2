<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="editorShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- editor window -->
  <g filter="url(#editorShadow)">
    <rect x="30" y="20" width="840" height="360" rx="10" fill="#282c34" stroke="#181a1f" stroke-width="1.5"/>

    <!-- title bar -->
    <rect x="30" y="20" width="840" height="32" rx="10" fill="#21252b"/>
    <rect x="30" y="40" width="840" height="12" fill="#21252b"/>
    <circle cx="52" cy="36" r="6" fill="#ff5f56"/>
    <circle cx="72" cy="36" r="6" fill="#ffbd2e"/>
    <circle cx="92" cy="36" r="6" fill="#27c93f"/>

    <!-- file tab -->
    <rect x="130" y="20" width="90" height="32" fill="#282c34"/>
    <text x="145" y="41" font-family="Fira Code, monospace" font-size="12" fill="#abb2bf">gpt.py</text>
    <rect x="130" y="50" width="90" height="2" fill="#61afef"/>

    <!-- bottom status bar -->
    <rect x="30" y="356" width="840" height="24" rx="0" fill="#21252b"/>
    <rect x="30" y="366" width="840" height="14" fill="#21252b"/>
    <rect x="30" y="368" width="840" height="12" rx="6" fill="#21252b"/>
    <text x="45" y="373" font-family="Fira Code, monospace" font-size="11" fill="#9da5b4">⎇ main</text>
    <text x="700" y="373" font-family="Fira Code, monospace" font-size="11" fill="#9da5b4">Python 3.12</text>
    <text x="790" y="373" font-family="Fira Code, monospace" font-size="11" fill="#9da5b4">UTF-8</text>
  </g>

  <!-- line numbers -->
  <g font-family="Fira Code, monospace" font-size="14" fill="#495162" text-anchor="end">
    <text x="65" y="80">1</text>
    <text x="65" y="104">2</text>
    <text x="65" y="128">3</text>
    <text x="65" y="152">4</text>
    <text x="65" y="176">5</text>
    <text x="65" y="200">6</text>
    <text x="65" y="224">7</text>
    <text x="65" y="248">8</text>
    <text x="65" y="272">9</text>
    <text x="65" y="296">10</text>
    <text x="65" y="320">11</text>
  </g>

  <!-- code lines, each appears in sequence then all fade out together to loop -->
  <g font-family="Fira Code, monospace" font-size="14">

    <text x="80" y="80"><tspan fill="#c678dd">class</tspan><tspan fill="#e5c07b"> Head</tspan><tspan fill="#abb2bf">(nn.Module):</tspan>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.04;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="104"><tspan fill="#5c6370">    """ one head of self-attention """</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.09;0.13;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="128"><tspan fill="#c678dd">    def</tspan><tspan fill="#61afef"> __init__</tspan><tspan fill="#abb2bf">(self, head_size):</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.17;0.21;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="152"><tspan fill="#abb2bf">        super().__init__()</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.25;0.29;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="176"><tspan fill="#abb2bf">        self.key </tspan><tspan fill="#c678dd">=</tspan><tspan fill="#abb2bf"> nn.Linear(n_embd, head_size)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.33;0.37;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="200"><tspan fill="#abb2bf">        self.query </tspan><tspan fill="#c678dd">=</tspan><tspan fill="#abb2bf"> nn.Linear(n_embd, head_size)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.41;0.45;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="224"><tspan fill="#abb2bf">        self.value </tspan><tspan fill="#c678dd">=</tspan><tspan fill="#abb2bf"> nn.Linear(n_embd, head_size)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.49;0.53;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="260"><tspan fill="#c678dd">    def</tspan><tspan fill="#61afef"> forward</tspan><tspan fill="#abb2bf">(self, x):</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.58;0.62;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="284"><tspan fill="#abb2bf">        wei </tspan><tspan fill="#c678dd">=</tspan><tspan fill="#abb2bf"> q @ k.transpose(</tspan><tspan fill="#d19a66">-2,-1</tspan><tspan fill="#abb2bf">) * k.shape[</tspan><tspan fill="#d19a66">-1</tspan><tspan fill="#abb2bf">]**</tspan><tspan fill="#d19a66">-0.5</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.67;0.71;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="308"><tspan fill="#abb2bf">        wei </tspan><tspan fill="#c678dd">=</tspan><tspan fill="#abb2bf"> F.softmax(wei, dim</tspan><tspan fill="#c678dd">=</tspan><tspan fill="#d19a66">-1</tspan><tspan fill="#abb2bf">)</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.75;0.79;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <text x="80" y="332"><tspan fill="#c678dd">        return</tspan><tspan fill="#abb2bf"> wei @ v</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.83;0.87;0.92;1" dur="13s" repeatCount="indefinite"/>
    </text>

    <!-- blinking cursor that travels down as lines "type" -->
    <rect x="76" y="70" width="8" height="16" fill="#528bff">
      <animate attributeName="y"
        values="70;70;94;94;118;118;142;142;166;166;190;190;214;214;250;250;274;274;298;298;322;322;70"
        keyTimes="0;0.04;0.08;0.13;0.17;0.21;0.25;0.29;0.33;0.37;0.41;0.45;0.49;0.53;0.58;0.62;0.67;0.71;0.75;0.79;0.83;0.87;1"
        dur="13s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0;1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
